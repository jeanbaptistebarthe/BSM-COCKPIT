<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>BSM Cockpit — Outil interne de pilotage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#102A43">
<link rel="icon" href="icon.svg">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --navy:#102A43; --navy-light:#1E3A5F; --cream:#F6F1E8; --gold:#C7A25A;
    --ink:#1B2430; --muted:#6B7280; --line:#E4E0D6;
    --red:#C0392B; --orange:#D97706; --amber:#B7891A; --green:#2F855A; --blue:#2563EB;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);}
  .topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid var(--line);padding:10px 20px;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:20;}
  .brand{font-weight:700;color:var(--navy);letter-spacing:.03em;font-size:15px;}
  .brand span{color:var(--gold);}
  .topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .tb-btn{border:1px solid var(--line);background:#fff;padding:7px 12px;border-radius:6px;font-size:12.5px;cursor:pointer;color:var(--navy);font-weight:600;}
  .tb-btn:hover{background:var(--cream);}
  .app{display:flex;min-height:calc(100vh - 53px);}
  .sidebar{width:210px;background:var(--navy);color:#fff;display:flex;flex-direction:column;padding:18px 0;flex-shrink:0;}
  .sidebar .logo{font-size:11px;letter-spacing:.08em;color:var(--gold);padding:0 18px 14px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:8px;}
  .sidebar .who{padding:0 18px 14px;font-size:12px;color:rgba(255,255,255,.6);}
  .navitem{padding:11px 18px;font-size:13.5px;cursor:pointer;color:rgba(255,255,255,.75);border-left:3px solid transparent;display:flex;align-items:center;gap:10px;}
  .navitem:hover{background:rgba(255,255,255,.05);}
  .navitem.active{color:#fff;border-left-color:var(--gold);background:rgba(255,255,255,.06);font-weight:600;}
  .navitem .ic{width:18px;text-align:center;}
  .navitem .badge-nav{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;}
  .main{flex:1;padding:24px 30px;overflow-x:auto;}
  .pagetitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .pagetitle h1{font-size:20px;margin:0;color:var(--navy);font-weight:700;}
  .pagetitle .sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .cta{background:var(--navy);color:#fff;border:none;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
  .cta:hover{background:var(--navy-light);}
  .cta.gold{background:var(--gold);color:var(--navy);}
  .cta.ghost{background:#fff;color:var(--navy);border:1px solid var(--line);}
  .cta.danger{background:var(--red);}
  .cta.sm{padding:5px 10px;font-size:12px;}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:15px 16px;}
  .kpi .v{font-size:22px;font-weight:700;color:var(--navy);line-height:1.1;}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px;}
  .kpi .v.warn{color:var(--orange);} .kpi .v.danger{color:var(--red);} .kpi .v.good{color:var(--green);}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:18px;}
  .card h2{font-size:14px;color:var(--navy);margin:0 0 12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .grid2.wide{grid-template-columns:1.5fr 1fr;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.03em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line);}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FCFAF5;}
  .badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap;}
  .b-actif{background:#E7F3EC;color:var(--green);} .b-prospect{background:#FEF3E2;color:var(--amber);} .b-archive{background:#F1F1F1;color:var(--muted);}
  .b-red{background:#FBEAE8;color:var(--red);} .b-orange{background:#FDF1E3;color:var(--orange);} .b-green{background:#E7F3EC;color:var(--green);} .b-blue{background:#E6EEFB;color:var(--blue);} .b-grey{background:#F1F1F1;color:var(--muted);}
  .rowact{display:flex;gap:6px;}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:var(--navy);}
  .iconbtn:hover{background:var(--cream);}
  .iconbtn.del:hover{background:#FBEAE8;color:var(--red);border-color:var(--red);}
  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
  .chip{border:1px solid var(--line);background:#fff;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;color:var(--ink);}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .searchbox{margin-left:auto;padding:7px 12px;border:1px solid var(--line);border-radius:6px;font-size:13px;min-width:200px;}
  .screen{display:none;} .screen.active{display:block;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:34px 10px;}
  /* bars */
  .bars{display:flex;align-items:flex-end;gap:10px;height:150px;margin-top:10px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .bar{width:70%;background:var(--gold);border-radius:4px 4px 0 0;min-height:2px;transition:height .3s;}
  .bar.prov{background:#DCD3BE;}
  .bar-val{font-size:9.5px;color:var(--navy);font-weight:700;margin-bottom:3px;}
  .bar-lbl{font-size:10.5px;color:var(--muted);margin-top:6px;}
  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-head .m{font-weight:700;color:var(--navy);font-size:15px;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal .dow{font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;padding-bottom:4px;font-weight:600;}
  .cal .day{min-height:62px;border:1px solid var(--line);border-radius:6px;padding:5px;font-size:11px;cursor:pointer;background:#fff;position:relative;}
  .cal .day:hover{border-color:var(--gold);}
  .cal .day.out{background:#FAF8F2;color:#C9C4B6;}
  .cal .day.today{border-color:var(--navy);border-width:2px;}
  .cal .day .dn{font-weight:600;color:var(--navy);}
  .cal .ev{margin-top:3px;font-size:9.5px;border-radius:4px;padding:1px 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:#fff;}
  .ev-audit{background:var(--navy);} .ev-prospect{background:var(--amber);} .ev-rdv{background:var(--green);} .ev-autre{background:var(--muted);}
  .dotlegend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:10px;flex-wrap:wrap;}
  .dotlegend span{display:flex;align-items:center;gap:5px;}
  .dotlegend i{width:10px;height:10px;border-radius:3px;display:inline-block;}
  /* advice */
  .advice{border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#fff;display:flex;gap:12px;align-items:flex-start;}
  .advice.danger{border-left-color:var(--red);} .advice.warn{border-left-color:var(--orange);} .advice.info{border-left-color:var(--blue);} .advice.good{border-left-color:var(--green);}
  .advice .ic{font-size:18px;}
  .advice .body{flex:1;}
  .advice .t{font-weight:700;color:var(--navy);font-size:13.5px;}
  .advice .x{font-size:12.5px;color:var(--ink);margin-top:3px;line-height:1.5;}
  .advice .meta{font-size:11px;color:var(--muted);margin-top:5px;}
  .advice .acts{display:flex;gap:6px;flex-shrink:0;}
  .tag-manual{font-size:9.5px;background:var(--cream);color:var(--muted);border-radius:8px;padding:1px 6px;vertical-align:middle;}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(16,42,67,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;position:relative;}
  .modal h2{margin:0 0 4px;color:var(--navy);font-size:18px;}
  .modal .msub{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .modal .close{position:absolute;top:14px;right:18px;cursor:pointer;font-size:20px;color:var(--muted);}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
  .field input,.field select,.field textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:inherit;}
  .field.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .field.row2 label{grid-column:1/3;}
  .modal-actions{display:flex;gap:8px;margin-top:8px;}
  .modal-actions .cta{flex:1;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .25s,transform .25s;box-shadow:0 6px 20px rgba(0,0,0,.25);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .segmented{display:inline-flex;background:var(--cream);border-radius:8px;padding:3px;gap:3px;}
  .segmented button{border:none;background:transparent;padding:6px 14px;font-size:12.5px;border-radius:6px;cursor:pointer;color:var(--muted);font-weight:600;}
  .segmented button.active{background:#fff;color:var(--navy);box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .mini-list{font-size:13px;}
  .mini-list .li{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);gap:10px;}
  .mini-list .li:last-child{border-bottom:none;}
  .mini-list .li .d{color:var(--muted);font-size:12px;white-space:nowrap;}
  .b-amber{background:#FEF3E2;color:var(--amber);}
  .navgroup{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;padding:12px 18px 4px;}
  .subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap;}
  .subtab{padding:9px 16px;font-size:13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;font-weight:600;}
  .subtab.active{color:var(--navy);border-bottom-color:var(--gold);}
  .r5mini{display:inline-flex;gap:3px;width:104px;vertical-align:middle;}
  .r5mini div{flex:1;height:6px;border-radius:2px;background:rgba(16,42,67,.12);}
  .r5mini div.on{background:var(--gold);}
  .progress{background:var(--line);border-radius:6px;height:8px;overflow:hidden;min-width:64px;display:inline-block;width:80px;vertical-align:middle;}
  .progress i{display:block;height:100%;background:var(--gold);}
  .heat-wrap{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;}
  .heat{display:grid;grid-template-columns:46px repeat(5,minmax(46px,1fr));grid-auto-rows:54px;gap:4px;flex:1;min-width:340px;}
  .heat .yl{display:flex;align-items:center;justify-content:flex-end;font-size:10px;color:var(--muted);padding-right:6px;}
  .heat .xl{font-size:9px;color:var(--muted);text-align:center;padding-top:4px;}
  .heat .cell{border-radius:5px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2px;padding:2px;}
  .rdot{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);}
  iframe.formframe{width:100%;height:68vh;border:1px solid var(--line);border-radius:8px;background:#fff;}
  .infobox{background:#F0F5FA;border:1px solid #D6E2EE;border-radius:8px;padding:12px 14px;font-size:12.5px;color:var(--navy);line-height:1.55;margin-bottom:14px;}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr);}.grid2,.grid2.wide{grid-template-columns:1fr;}.sidebar{width:60px;}.sidebar .logo,.sidebar .who,.navgroup,.navitem span.lbl{display:none;}.navitem{justify-content:center;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">BSM <span>COCKPIT</span> — Pilotage interne</div>
  <div class="topbar-right">
    <button class="tb-btn" onclick="openImport()" title="Importer depuis le Sheet R5 / CSV">⇊ Importer R5</button>
    <span id="currency-indicator" class="tb-btn" onclick="openSettings()" title="Devise & paramètres">Ar / €</span>
    <button class="tb-btn" onclick="exportData()">⬇ Sauvegarde</button>
    <button class="tb-btn" onclick="document.getElementById('import-file').click()">⬆ Restaurer</button>
    <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)">
    <button class="tb-btn" onclick="openSettings()">⚙</button>
  </div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="logo">BSM ADVISORY & CONSULTING</div>
    <div class="who">J-B. Barthe · Direction</div>
    <div class="navgroup">PILOTAGE</div>
    <div class="navitem active" data-scr="dashboard" onclick="setScreen('dashboard')"><span class="ic">▦</span><span class="lbl">Tableau de bord</span></div>
    <div class="navitem" data-scr="clients" onclick="setScreen('clients')"><span class="ic">👥</span><span class="lbl">Clients</span></div>
    <div class="navitem" data-scr="agenda" onclick="setScreen('agenda')"><span class="ic">📅</span><span class="lbl">Agenda</span></div>
    <div class="navitem" data-scr="budget" onclick="setScreen('budget')"><span class="ic">💶</span><span class="lbl">Budget</span></div>
    <div class="navitem" data-scr="ca" onclick="setScreen('ca')"><span class="ic">📈</span><span class="lbl">Chiffre d'affaires</span></div>
    <div class="navgroup">MÉTHODE R5®</div>
    <div class="navitem" data-scr="missions" onclick="setScreen('missions')"><span class="ic">🎯</span><span class="lbl">Missions</span></div>
    <div class="navitem" data-scr="risks" onclick="setScreen('risks')"><span class="ic">⚠️</span><span class="lbl">Matrice des risques</span></div>
    <div class="navitem" data-scr="carto" onclick="setScreen('carto')"><span class="ic">🗺️</span><span class="lbl">Cartographie</span></div>
    <div class="navitem" data-scr="recos" onclick="setScreen('recos')"><span class="ic">✅</span><span class="lbl">Recommandations</span></div>
    <div class="navgroup">CABINET</div>
    <div class="navitem" data-scr="rh" onclick="setScreen('rh')"><span class="ic">🧑‍💼</span><span class="lbl">RH & équipe</span></div>
    <div class="navitem" data-scr="audit" onclick="setScreen('audit')"><span class="ic">📝</span><span class="lbl">Audit terrain</span></div>
    <div class="navitem" data-scr="analyses" onclick="setScreen('analyses')"><span class="ic">🧠</span><span class="lbl">Analyses & Conseils</span><span id="nav-advice-badge" class="badge-nav" style="display:none">0</span></div>
  </div>

  <div class="main">
    <div class="screen active" id="scr-dashboard"></div>
    <div class="screen" id="scr-clients"></div>
    <div class="screen" id="scr-agenda"></div>
    <div class="screen" id="scr-budget"></div>
    <div class="screen" id="scr-ca"></div>
    <div class="screen" id="scr-missions"></div>
    <div class="screen" id="scr-risks"></div>
    <div class="screen" id="scr-carto"></div>
    <div class="screen" id="scr-recos"></div>
    <div class="screen" id="scr-rh"></div>
    <div class="screen" id="scr-audit"></div>
    <div class="screen" id="scr-analyses"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   BSM COCKPIT — outil interne de pilotage BSM Advisory & Consulting
   Application locale, données stockées dans le navigateur (localStorage).
   Structure alignée sur le schéma Risk Hub pour migration web ultérieure.
   ========================================================================= */

const STORE_KEY = "bsm_cockpit_v1";
const PAYMENT_METHODS = ["CB","Chèque","Mvola","Orange Money","Espèces","Virement"];
const SECTORS = ["Industrie / Distribution","Banque / Finance","Énergie","Aéroportuaire","Télécom","Public / Institutionnel","Santé","Autre"];
const CAT_IN  = ["Honoraires mission","Diagnostic / Audit","Formation","Veille / Abonnement","Autre"];
const CAT_OUT = ["Salaires","Loyer / Bureau","Déplacements","Fournitures","Marketing","Sous-traitance","Charges & taxes","Autre"];
const EVENT_TYPES = {audit:"Audit", prospect:"Prospection", rdv:"Rendez-vous", autre:"Autre"};
// --- Méthode R5 ---
const R5_PHASES = ["REVEAL","CONNECT","RESPOND","STRENGTHEN","REVIEW"];
const R5_LABELS = {REVEAL:"R1 · Reveal",CONNECT:"R2 · Connect",RESPOND:"R3 · Respond",STRENGTHEN:"R4 · Strengthen",REVIEW:"R5 · Review"};
const MISSION_TYPES = ["Audit initial","Accompagnement annuel","Diagnostic R5","Cartographie des risques","PCA / Continuité","Formation","Veille réglementaire","Autre"];
const RISK_FAMILIES = ["Opérationnel","IT","Logistique","Sécurité","Finance","RH","Juridique","Conformité","Stratégique","Réputation","Environnement"];
const RISK_CATEGORIES = ["Cyberattaque","Énergie","Logistique","Fournisseur unique","Fraude interne","Conformité / RGPD","Personnel clé","Trésorerie","Réputation","Catastrophe naturelle","Sécurité physique","Autre"];
const RECO_HORIZONS = ["Prioritaire (< 15j)","Court terme (< 30j)","Moyen terme (< 90j)","Long terme (> 90j)"];
const RECO_PRIORITIES = ["Critique","Élevée","Modérée","Faible"];
// --- RH ---
const RH_POLES = ["Direction","Audit / Conseil","Analyse des risques","Commercial","Administratif","Terrain","Support IT"];
const RH_PERMISSIONS = ["Administrateur","Consultant","Analyste","Assistant","Lecture seule"];
const CONTRACT_TYPES = ["CDI","CDD","Stage","Prestation","Poste à pourvoir"];
const LEAVE_TYPES = ["Congé payé","Maladie","Sans solde","Récupération","Mission terrain","Formation"];
const AUDIT_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSd7P7NzygqF1RizjTcYJvaFCbRUV71-XAdPe7Ly0Kth08vi4A/viewform";
function r5Niveau(score){ return score>=15?"CRITIQUE":score>=9?"HAUTE":score>=4?"MOYENNE":"FAIBLE"; }
function r5Badge(n){ return {CRITIQUE:"b-red",HAUTE:"b-orange",MOYENNE:"b-amber",FAIBLE:"b-green"}[n]||"b-grey"; }

/* ----------------------------- État ----------------------------- */
let DB = null;
let calRef = null; // mois affiché dans l'agenda

function todayISO(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

function defaultDB(){
  return {
    meta:{ version:2, defaultCurrency:"MGA", rateEurMga:5000, created:todayISO(), r5SheetId:"" },
    clients:[], events:[], transactions:[],
    missions:[], risks:[], recommendations:[],
    employees:[], recruitments:[], leaves:[], activities:[],
    advice:{ dismissed:[], edits:{}, custom:[] }
  };
}

function seedDB(){
  const d = defaultDB();
  const t = new Date();
  const iso = (offset)=>{ const x=new Date(t); x.setDate(x.getDate()+offset); return x.toISOString().slice(0,10); };
  const c1=uid(), c2=uid(), c3=uid();
  d.clients=[
    {id:c1, company:"Groupe Meridian", sector:"Industrie / Distribution", contactName:"PDG Meridian", contactEmail:"pdg@meridian-demo.mg", contactPhone:"+261 32 00 000 00", status:"actif", notes:"Exemple fictif — mission diagnostic en cours.", createdAt:iso(-45)},
    {id:c2, company:"Leader Price", sector:"Industrie / Distribution", contactName:"Dir. Financier", contactEmail:"contact@leaderprice-demo.mg", contactPhone:"+261 34 11 111 11", status:"prospect", notes:"Exemple fictif — en négociation.", createdAt:iso(-20)},
    {id:c3, company:"BMOI", sector:"Banque / Finance", contactName:"Resp. Conformité", contactEmail:"conformite@bmoi-demo.mg", contactPhone:"+261 32 22 222 22", status:"prospect", notes:"Exemple fictif — proposition envoyée.", createdAt:iso(-12)}
  ];
  d.events=[
    {id:uid(), clientId:c1, type:"audit", title:"Audit sécurité SI — Meridian", date:iso(3), time:"09:00", location:"Sur site", status:"planifie", notes:"Exemple fictif."},
    {id:uid(), clientId:c2, type:"prospect", title:"Relance commerciale Leader Price", date:iso(1), time:"14:00", location:"Téléphone", status:"planifie", notes:""},
    {id:uid(), clientId:c3, type:"rdv", title:"Présentation offre BMOI", date:iso(-2), time:"10:30", location:"Visio", status:"planifie", notes:"À passer en 'réalisé' ou 'annulé'."}
  ];

/* ----------------------------- Devise ----------------------------- */
function toDefault(amount, cur){
  const dc = DB.meta.defaultCurrency, rate = DB.meta.rateEurMga||5000;
  if(cur===dc) return amount;
  if(cur==="EUR" && dc==="MGA") return amount*rate;
  if(cur==="MGA" && dc==="EUR") return amount/rate;
  return amount;
}
function fmt(amount, cur){
  cur = cur || DB.meta.defaultCurrency;
  const n = Math.round(amount);
  if(cur==="MGA") return n.toLocaleString('fr-FR') + " Ar";
  return n.toLocaleString('fr-FR') + " €";
}
function fmtD(amount){ return fmt(amount, DB.meta.defaultCurrency); }

/* ----------------------------- Agrégations ----------------------------- */
function curYear(){ return new Date().getFullYear(); }
function inYear(dstr, y){ return dstr && dstr.slice(0,4)===String(y); }

function agg(){
  const y = curYear();
  let caEffectif=0, caProvisoire=0, chargesPayees=0, chargesPrevues=0, enAttente=0, enRetard=0;
  DB.transactions.forEach(tx=>{
    const v = toDefault(tx.amount, tx.currency);
    if(tx.sens==="entrant"){
      if(tx.status==="realise" && inYear(tx.date,y)) caEffectif+=v;
      if(tx.status==="prevu"){ caProvisoire+=v; enAttente+=v; if((tx.dueDate||tx.date)<todayISO()) enRetard+=v; }
    } else {
      if(tx.status==="realise" && inYear(tx.date,y)) chargesPayees+=v;
      if(tx.status==="prevu") chargesPrevues+=v;
    }
  });
  return {caEffectif, caProvisoire, chargesPayees, chargesPrevues, enAttente, enRetard,
    solde: caEffectif-chargesPayees};
}

function monthlySeries(sens, status){
  // 7 derniers mois
  const out=[]; const base=new Date(); base.setDate(1);
  for(let i=6;i>=0;i--){
    const d=new Date(base); d.setMonth(d.getMonth()-i);
    const key=d.toISOString().slice(0,7);
    let sum=0;
    DB.transactions.forEach(tx=>{
      if(tx.sens===sens && (status? tx.status===status : true) && tx.date.slice(0,7)===key)
        sum+=toDefault(tx.amount,tx.currency);
    });
    out.push({label:d.toLocaleDateString('fr-FR',{month:'short'}), key, sum});
  }
  return out;
}

function calendarHtml(){
  const y=calRef.getFullYear(), m=calRef.getMonth();
  const first=new Date(y,m,1); let start=(first.getDay()+6)%7; // lundi=0
  const days=new Date(y,m+1,0).getDate();
  const dows=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  let cells=dows.map(d=>`<div class="dow">${d}</div>`).join("");
  for(let i=0;i<start;i++){ const dprev=new Date(y,m,-start+i+1); cells+=`<div class="day out">${dprev.getDate()}</div>`; }
  for(let d=1;d<=days;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=DB.events.filter(e=>e.date===iso && (agendaFilter==="tous"||e.type===agendaFilter));
    cells+=`<div class="day ${iso===todayISO()?'today':''}" onclick="openEventForm(null,'${iso}')">
      <div class="dn">${d}</div>

    </div>`;
  }
  return `<div class="cal">${cells}</div>`;
}

  const a=agg();
  let list=DB.transactions.slice();

  list.sort((x,y)=>(y.date).localeCompare(x.date));
  document.getElementById("scr-budget").innerHTML=`
    <div class="pagetitle"><div><h1>Budget</h1><div class="sub">Prévisions, entrants, sortants — par mode de paiement</div></div>
      <div style="display:flex;gap:8px"><button class="cta ghost" onclick="openTxForm(null,'sortant')">− Dépense</button><button class="cta" onclick="openTxForm(null,'entrant')">+ Entrée</button></div></div>
    <div class="kpis">
      <div class="kpi"><div class="v good">${fmtD(a.caEffectif)}</div><div class="l">Entrées encaissées ${curYear()}</div></div>
      <div class="kpi"><div class="v">${fmtD(a.enAttente)}</div><div class="l">Entrées prévues (à venir)</div></div>
      <div class="kpi"><div class="v warn">${fmtD(a.chargesPayees)}</div><div class="l">Dépenses payées ${curYear()}</div></div>
      <div class="kpi"><div class="v ${a.solde<0?'danger':'good'}">${fmtD(a.solde)}</div><div class="l">Solde net</div></div>
    </div>
    <div class="filters">
      ${[["tous","Tous"],["entrant","Entrées"],["sortant","Dépenses"]].map(f=>`<button class="chip ${budgetSens===f[0]?'active':''}" onclick="budgetSens='${f[0]}';renderBudget()">${f[1]}</button>`).join("")}
      <span style="width:14px"></span>
      ${[["tous","Tous statuts"],["prevu","Prévu"],["realise","Réalisé"]].map(f=>`<button class="chip ${budgetStatus===f[0]?'active':''}" onclick="budgetStatus='${f[0]}';renderBudget()">${f[1]}</button>`).join("")}

/* ----------------------------- Chiffre d'affaires ----------------------------- */
function renderCA(){
  const a=agg();
  const effSeries=monthlySeries("entrant","realise");
  const provSeries=monthlySeries("entrant","prevu");
  const y=curYear();
  // par client
  const byClient={};
  DB.transactions.filter(t=>t.sens==="entrant").forEach(t=>{
    const k=t.clientId||"__none";
    byClient[k]=byClient[k]||{eff:0,prov:0};
    const v=toDefault(t.amount,t.currency);
    if(t.status==="realise"&&inYear(t.date,y)) byClient[k].eff+=v; else if(t.status==="prevu") byClient[k].prov+=v;
  });
  const rows=Object.entries(byClient).map(([k,v])=>({name:k==="__none"?"— Sans client —":clientName(k),...v}))
    .filter(r=>r.eff||r.prov).sort((a,b)=>(b.eff+b.prov)-(a.eff+a.prov));
  document.getElementById("scr-ca").innerHTML=`
    <div class="pagetitle"><div><h1>Chiffre d'affaires</h1><div class="sub">Provisoire (à encaisser) vs effectif (encaissé) — ${y}</div></div></div>
    <div class="kpis">
      <div class="kpi"><div class="v good">${fmtD(a.caEffectif)}</div><div class="l">CA effectif encaissé</div></div>
      <div class="kpi"><div class="v">${fmtD(a.caProvisoire)}</div><div class="l">CA provisoire (pipeline)</div></div>
      <div class="kpi"><div class="v">${fmtD(a.caEffectif+a.caProvisoire)}</div><div class="l">CA potentiel total</div></div>
      <div class="kpi"><div class="v ${a.enRetard>0?'danger':''}">${fmtD(a.enRetard)}</div><div class="l">Dont en retard d'encaissement</div></div>
    </div>
    <div class="card">
      <h2>CA encaissé (or) vs prévu (beige) — 7 mois</h2>
      ${dualBarsHtml(effSeries, provSeries)}
    </div>
    <div class="card">
      <h2>CA par client</h2>
      ${rows.length? `<table><thead><tr><th>Client</th><th style="text-align:right">Effectif</th><th style="text-align:right">Provisoire</th><th style="text-align:right">Total</th></tr></thead><tbody>`+
      rows.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td style="text-align:right;color:var(--green)">${r.eff?fmtD(r.eff):"—"}</td>
        <td style="text-align:right">${r.prov?fmtD(r.prov):"—"}</td><td style="text-align:right;font-weight:700">${fmtD(r.eff+r.prov)}</td></tr>`).join("")+
      `</tbody></table>` : `<div class="empty">Aucune entrée enregistrée.</div>`}
    </div>`;
}
function dualBarsHtml(eff, prov){
  const max=Math.max(1,...eff.map(s=>s.sum),...prov.map(s=>s.sum));
  return `<div class="bars">`+eff.map((s,i)=>`
    <div class="bar-col"><div style="display:flex;gap:3px;align-items:flex-end;width:100%;height:100%;justify-content:center">
      <div class="bar" style="height:${Math.round(s.sum/max*100)}%;width:40%" title="Encaissé ${s.label}: ${fmtD(s.sum)}"></div>
      <div class="bar prov" style="height:${Math.round(prov[i].sum/max*100)}%;width:40%" title="Prévu ${s.label}: ${fmtD(prov[i].sum)}"></div>
    </div><div class="bar-lbl">${s.label}</div></div>`).join("")+`</div>`;
}

/* ----------------------------- Analyses & Conseils ----------------------------- */
function generateAdvice(){
  const out=[]; const t=todayISO();
  const y=curYear();
  const add=(id,level,icon,title,text)=>{
    if(DB.advice.dismissed.includes(id)) return;
    const ed=DB.advice.edits[id];
    out.push({id, level, icon, title, text: ed!=null?ed:text, edited: ed!=null, auto:true});
  };
  // 1. Encaissements en retard
  DB.transactions.filter(x=>x.sens==="entrant"&&x.status==="prevu"&&(x.dueDate||x.date)<t).forEach(x=>{
    add("retard-"+x.id,"danger","⏰","Encaissement en retard",
      `« ${x.label} » (${fmt(x.amount,x.currency)}${x.clientId?", "+clientName(x.clientId):""}) : échéance du ${frDate(x.dueDate||x.date)} dépassée. Relancer le client et confirmer la date d'encaissement.`);
  });
  // 2. Trésorerie du mois : dépenses > entrées
  const mk=t.slice(0,7);
  const inM=DB.transactions.filter(x=>x.sens==="entrant"&&x.status==="realise"&&x.date.slice(0,7)===mk).reduce((s,x)=>s+toDefault(x.amount,x.currency),0);
  const outM=DB.transactions.filter(x=>x.sens==="sortant"&&x.status==="realise"&&x.date.slice(0,7)===mk).reduce((s,x)=>s+toDefault(x.amount,x.currency),0);
  if(outM>inM && outM>0) add("treso-"+mk,"warn","📉","Trésorerie du mois négative",
    `Ce mois-ci : ${fmtD(outM)} de dépenses pour ${fmtD(inM)} d'entrées (solde ${fmtD(inM-outM)}). Prioriser les encaissements en attente avant d'engager de nouvelles dépenses.`);
  // 3. Prospects sans relance récente
  DB.clients.filter(c=>c.status==="prospect").forEach(c=>{
    const evs=DB.events.filter(e=>e.clientId===c.id);
    const last=evs.map(e=>e.date).sort().pop();
    const stale = !last || last < isoOffset(-21);
    const future = evs.some(e=>e.date>=t && e.status!=="annule");
    if(stale && !future) add("relance-"+c.id,"info","📞","Prospect à relancer",
      `${c.company} est en prospection ${last?"sans contact depuis le "+frDate(last):"sans aucun événement planifié"}. Planifier une relance pour ne pas perdre l'opportunité.`);
  });
  // 4. Clients actifs sans point à venir
  DB.clients.filter(c=>c.status==="actif").forEach(c=>{
    const future=DB.events.some(e=>e.clientId===c.id && e.date>=t && e.status!=="annule");
    if(!future) add("suivi-"+c.id,"info","🗓️","Client actif sans point planifié",
      `${c.company} (client actif) n'a aucun rendez-vous ou audit à venir. Planifier un point de suivi pour entretenir la relation et repérer de nouvelles missions.`);
  });
  // 5. Événements passés non clôturés
  DB.events.filter(e=>e.date<t && e.status==="planifie").forEach(e=>{
    add("clot-"+e.id,"warn","✅","Événement à clôturer",
      `« ${e.title} » (${frDate(e.date)}) est toujours « planifié ». Le marquer comme réalisé ou annulé pour garder un historique fiable.`);
  });
  // 6. Tendance CA (mois courant vs précédent)
  const prevKey=(()=>{const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);})();
  const inPrev=DB.transactions.filter(x=>x.sens==="entrant"&&x.status==="realise"&&x.date.slice(0,7)===prevKey).reduce((s,x)=>s+toDefault(x.amount,x.currency),0);
  if(inPrev>0 && inM<inPrev*0.7) add("tendance-"+mk,"info","📊","CA en baisse ce mois",
    `Le CA encaissé ce mois (${fmtD(inM)}) est en net recul par rapport au mois précédent (${fmtD(inPrev)}). Vérifier le pipeline et accélérer la facturation des missions en cours.`);
  // 7. Recoupement : client à marge négative
  const perClient={};
  DB.transactions.filter(x=>x.status==="realise").forEach(x=>{
    if(!x.clientId) return; perClient[x.clientId]=perClient[x.clientId]||{in:0,out:0};
    const v=toDefault(x.amount,x.currency); if(x.sens==="entrant")perClient[x.clientId].in+=v; else perClient[x.clientId].out+=v;
  });
  Object.entries(perClient).forEach(([cid,v])=>{
    if(v.out>0 && v.out>v.in) add("marge-"+cid,"warn","⚖️","Rentabilité client à surveiller",
      `${clientName(cid)} : ${fmtD(v.out)} de dépenses engagées pour ${fmtD(v.in)} encaissés. Vérifier que la mission est bien facturée et rentable.`);
  });
  // 8. Risques critiques ouverts (matrice R5)
  DB.risks.filter(r=>r5Niveau(r.probabilite*r.impact)==="CRITIQUE"&&r.status!=="traite").forEach(r=>{
    add("riskcrit-"+r.id,"danger","🔴","Risque critique à traiter",
      `${r.ref?r.ref+" — ":""}${r.description||r.categorie} (${clientName(r.clientId)}) : score ${r.probabilite*r.impact}/25 (CRITIQUE). ${r.mesures&&r.mesures.toLowerCase()!=="aucune"?"Vérifier l'efficacité des mesures existantes.":"Aucune mesure en place — agir en priorité."}`);
  });
  // 9. Recommandations en retard
  DB.recommendations.filter(r=>r.status!=="fait"&&r.dateCible&&r.dateCible<t).forEach(r=>{
    add("recolate-"+r.id,"warn","📌","Recommandation en retard",
      `${r.ref?r.ref+" — ":""}${r.texte} (${clientName(r.clientId)}) : date cible du ${frDate(r.dateCible)} dépassée, statut « ${r.status==="en_cours"?"en cours":"à faire"} ».`);
  });
  // 10. Mission avancée sans risque saisi
  DB.missions.filter(m=>m.status==="en_cours"&&["RESPOND","STRENGTHEN","REVIEW"].includes(m.phase)).forEach(m=>{
    if(!DB.risks.some(r=>r.missionId===m.id)) add("noris-"+m.id,"info","🎯","Mission sans risque cartographié",
      `La mission « ${m.type} » (${clientName(m.clientId)}) est en phase ${R5_LABELS[m.phase]||m.phase} mais aucun risque n'est saisi. Compléter la matrice des risques.`);
  });
  // 11. Risques récurrents par secteur (intelligence inter-clients)
  const groupes={};
  DB.risks.forEach(r=>{
    const cl=DB.clients.find(c=>c.id===r.clientId); const sect=cl?(cl.sector||"—"):"—";
    const key=sect+"||"+r.categorie;
    groupes[key]=groupes[key]||{sect,cat:r.categorie,clients:new Set(),n:0,score:0};
    groupes[key].clients.add(r.clientId); groupes[key].n++; groupes[key].score+=r.probabilite*r.impact;
  });
  Object.values(groupes).filter(g=>g.clients.size>=2).forEach(g=>{
    add("recur-"+g.sect+"-"+g.cat,"info","🔎","Risque récurrent — "+g.sect,
      `Le risque « ${g.cat} » revient chez ${g.clients.size} clients du secteur ${g.sect} (score moyen ${(g.score/g.n).toFixed(1)}/25). Signal utile pour la veille sectorielle et la prospection.`);
  });
  // conseils manuels
  DB.advice.custom.forEach(c=> out.push({...c, auto:false}));
  // tri par gravité
  const order={danger:0,warn:1,info:2,good:3};
  out.sort((a,b)=>order[a.level]-order[b.level]);
  return out;
}
function renderAnalyses(){
  const adv=generateAdvice();
  const counts={danger:0,warn:0,info:0};
  adv.forEach(a=>{if(counts[a.level]!=null)counts[a.level]++;});
  document.getElementById("scr-analyses").innerHTML=`
    <div class="pagetitle"><div><h1>Analyses & Conseils</h1><div class="sub">Détection automatique par règles · conseils éditables manuellement</div></div>
      <button class="cta" onclick="addCustomAdvice()">+ Conseil manuel</button></div>
    <div class="kpis">
      <div class="kpi"><div class="v danger">${counts.danger}</div><div class="l">Alertes critiques</div></div>
      <div class="kpi"><div class="v warn">${counts.warn}</div><div class="l">Points de vigilance</div></div>
      <div class="kpi"><div class="v">${counts.info}</div><div class="l">Suggestions</div></div>
      <div class="kpi"><div class="v">${adv.length}</div><div class="l">Total</div></div>
    </div>
    <div class="card">

}
function saveSettings(){
  DB.meta.defaultCurrency=val("s-cur");
  const r=parseFloat(val("s-rate")); DB.meta.rateEurMga=(!isNaN(r)&&r>0)?r:DB.meta.rateEurMga;
  save(); closeModal(); document.getElementById("currency-indicator").textContent=DB.meta.defaultCurrency==="MGA"?"Ar / €":"€ / Ar";
  refreshAll(); toast("Paramètres enregistrés.");
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="BSM_Cockpit_sauvegarde_"+todayISO()+".json"; a.click();
  toast("Sauvegarde exportée.");
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
      if(!d.clients||!d.transactions){ toast("Fichier invalide."); return; }
      confirmModal("Restaurer cette sauvegarde ?","Les données actuelles seront remplacées par le contenu du fichier.",()=>{
        DB=d; DB.advice=DB.advice||{dismissed:[],edits:{},custom:[]}; save(); closeModal();
        document.getElementById("currency-indicator").textContent=DB.meta.defaultCurrency==="MGA"?"Ar / €":"€ / Ar";
        refreshAll(); toast("Sauvegarde restaurée."); });
    }catch(e){ toast("Impossible de lire le fichier."); } };
  r.readAsText(f); ev.target.value="";
}
function resetData(){
  confirmModal("Tout réinitialiser ?","Toutes les données de ce cockpit seront effacées et remplacées par des exemples fictifs. Pensez à exporter une sauvegarde avant.",()=>{
    DB=seedDB(); save(); closeModal(); refreshAll(); toast("Données réinitialisées.");});
}

function openModal(html){ document.getElementById("modal-content").innerHTML=html; document.getElementById("overlay").classList.add("show"); }
function closeModal(){ document.getElementById("overlay").classList.remove("show"); }
function confirmModal(title, text, onYes){
  window.__yes=onYes;
  openModal(`<span class="close" onclick="closeModal()">✕</span><h2>${title}</h2>
    <div class="x" style="font-size:13.5px;color:var(--ink);line-height:1.6;margin:8px 0 16px">${text}</div>

function val(id){ const e=document.getElementById(id); return e?e.value:""; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):s; }
function statusBadge(s){ return {actif:"b-actif",prospect:"b-prospect",archive:"b-archive"}[s]||"b-grey"; }
function evBadge(t){ return {audit:"b-blue",prospect:"b-prospect",rdv:"b-green",autre:"b-grey"}[t]||"b-grey"; }
function frDate(iso){ if(!iso) return "—"; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function isoOffset(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(window.__tt); window.__tt=setTimeout(()=>t.classList.remove("show"),2600); }

function nextRef(prefix, arr){
  let max=0; arr.forEach(x=>{ const m=(x.ref||"").match(new RegExp(prefix+"-?(\\d+)")); if(m)max=Math.max(max,parseInt(m[1])); });
  return prefix+"-"+String(max+1).padStart(3,"0");
}

      ${["tous","CRITIQUE","HAUTE","MOYENNE","FAIBLE"].map(n=>`<button class="chip ${riskFN===n?'active':''}" onclick="riskFN='${n}';renderRisks()">${n==='tous'?'Tous niveaux':cap(n.toLowerCase())}</button>`).join("")}

/* ----------------------------- Cartographie ----------------------------- */
let cartoClient="tous";
function bandColorR5(score){
  if(score>=15) return "rgba(192,57,43,0.28)";
  if(score>=9) return "rgba(217,119,6,0.26)";
  if(score>=4) return "rgba(183,137,26,0.22)";
  return "rgba(47,133,90,0.18)";
}
function renderCarto(){
  let risks=DB.risks.slice();
  if(cartoClient!=="tous") risks=risks.filter(r=>r.clientId===cartoClient);
  let cells="";const yl=["5","4","3","2","1"];
  for(let row=0;row<5;row++){const p=5-row;cells+=`<div class="yl">${yl[row]}</div>`;
    for(let i=1;i<=5;i++){const sc=p*i;const here=risks.filter(r=>r.probabilite===p&&r.impact===i);
      cells+=`<div class="cell" style="background:${bandColorR5(sc)}">`+here.map(r=>`<div class="rdot" title="${esc(r.description||r.categorie)}" onclick="openRiskForm('${r.id}')">${sc}</div>`).join("")+`</div>`;}}
  cells+=`<div></div>`+["1","2","3","4","5"].map(x=>`<div class="xl">${x}</div>`).join("");
  const fam={};risks.forEach(r=>{fam[r.famille]=(fam[r.famille]||0)+1;});
  const niv={CRITIQUE:0,HAUTE:0,MOYENNE:0,FAIBLE:0};risks.forEach(r=>{niv[r5Niveau(r.probabilite*r.impact)]++;});
  document.getElementById("scr-carto").innerHTML=`
    <div class="pagetitle"><div><h1>Cartographie des risques</h1><div class="sub">Heatmap Probabilité × Impact — ${risks.length} risque(s)</div></div>
      <select class="chip" style="padding:7px 10px" onchange="cartoClient=this.value;renderCarto()"><option value="tous">Tous les clients</option>${DB.clients.map(c=>`<option value="${c.id}" ${cartoClient===c.id?'selected':''}>${esc(c.company)}</option>`).join("")}</select></div>
    <div class="grid2 wide">
      <div class="card">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px">↑ Probabilité &nbsp;·&nbsp; Impact →</div>
        <div class="heat-wrap"><div class="heat">${cells}</div></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:11.5px">
          <span class="badge b-red">CRITIQUE ≥15</span><span class="badge b-orange">HAUTE 9-14</span>
          <span class="badge b-amber">MOYENNE 4-8</span><span class="badge b-green">FAIBLE ≤3</span></div>
      </div>
      <div class="card">
        <h2>Répartition par niveau</h2>
        <div class="mini-list">${Object.entries(niv).map(([k,v])=>`<div class="li"><span class="badge ${r5Badge(k)}">${k}</span><b>${v}</b></div>`).join("")}</div>
        <h2 style="margin-top:16px">Par famille de risque</h2>
        <div class="mini-list">${Object.keys(fam).length?Object.entries(fam).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="li"><span>${esc(k)}</span><b>${v}</b></div>`).join(""):`<div class="empty">Aucun risque.</div>`}</div>
      </div>
    </div>`;
}

    <div class="field"><label>Mission liée</label><select id="f-amiss"><option value="">— Aucune —</option>${DB.missions.map(m=>`<option value="${esc(m.ref||m.type)}" ${a.missionRef===(m.ref||m.type)?'selected':''}>${esc(m.ref||m.type)} — ${clientName(m.clientId)}</option>`).join("")}</select></div>
    <div class="field"><label>Notes</label><textarea id="f-anotes" rows="2">${esc(a.notes||'')}</textarea></div>
    <div class="modal-actions"><button class="cta ghost" onclick="closeModal()">Annuler</button><button class="cta" onclick="saveActivity('${id||''}')">Enregistrer</button></div>`);
}
function saveActivity(id){
  const obj={employeeId:val("f-aemp"),date:val("f-adate"),hours:parseFloat(val("f-ahours"))||"",label:val("f-alabel"),missionRef:val("f-amiss"),notes:val("f-anotes")};
  if(id){Object.assign(DB.activities.find(x=>x.id===id),obj);}else{obj.id=uid();DB.activities.push(obj);}
  save();closeModal();renderRH();toast("Activité enregistrée.");
}
function deleteActivity(id){confirmModal("Supprimer cette activité ?","",()=>{DB.activities=DB.activities.filter(x=>x.id!==id);save();renderRH();toast("Supprimé.");});}

/* ----------------------------- Import R5 (CSV / Google Sheet publié) ----------------------------- */
function openImport(){
  openModal(`
    <span class="close" onclick="closeModal()">✕</span>
    <h2>Importer des données R5</h2>
    <div class="msub">Depuis un fichier CSV (export du Sheet) ou en direct depuis un Google Sheet publié sur le web.</div>
    <div class="field"><label>Type de données à importer</label>
      <select id="imp-type">
        <option value="clients">Clients</option>
        <option value="risks">Matrice des risques</option>
        <option value="missions">Missions</option>
        <option value="recos">Recommandations</option>
      </select></div>
    <div class="infobox">Les colonnes sont reconnues automatiquement d'après les en-têtes de ta matrice R5 (Entreprise, Famille, Description, Probabilité, Impact…). Les lignes de titre sont ignorées.</div>
    <div class="field"><label>Option 1 — Fichier CSV</label>
      <input type="file" id="imp-file" accept=".csv,text/csv" onchange="doImportFile()"></div>
    <div class="hint">Dans Google Sheets : Fichier → Télécharger → Valeurs séparées par des virgules (.csv), un onglet à la fois.</div>
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <div class="field"><label>Option 2 — Google Sheet publié (lecture live)</label>
      <input id="imp-sheeturl" placeholder="Coller l'URL du Google Sheet"></div>
    <div class="field"><label>Nom exact de l'onglet</label><input id="imp-sheetname" placeholder="MATRICE DES RISQUES"></div>
    <div class="modal-actions"><button class="cta ghost" onclick="closeModal()">Fermer</button><button class="cta" onclick="doImportLive()">Lire le Sheet en direct</button></div>
    <div id="imp-result" class="hint" style="margin-top:10px"></div>`);
}
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c==='"')q=true; else if(c===','){row.push(cur);cur="";} else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";} else if(c==='\r'){} else cur+=c; }
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()!==""));
}
function norm(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();}
function findHeaderRow(rows,keys){
  for(let i=0;i<Math.min(rows.length,8);i++){const cells=rows[i].map(norm);if(keys.some(k=>cells.some(c=>c.includes(k))))return i;}
  return 0;
}
function colIndex(header,names){const H=header.map(norm);for(const n of names){const idx=H.findIndex(h=>h.includes(norm(n)));if(idx>=0)return idx;}return -1;}
function gv(r,i){return i>=0&&r[i]!=null?String(r[i]).trim():"";}
function clampN(v){const n=parseInt(String(v||"").replace(/[^\d]/g,""));return isNaN(n)?1:Math.max(1,Math.min(5,n));}
function mapStatut(s){s=norm(s);return s.includes("actif")?"actif":s.includes("archiv")?"archive":"prospect";}
function mapRiskStatut(s){s=norm(s);return (s.includes("trait")&&!s.includes("a trait"))?"traite":s.includes("cours")?"en_cours":"a_traiter";}
function mapMissionStatut(s){s=norm(s);return s.includes("termin")?"termine":s.includes("suspend")?"suspendue":"en_cours";}
function mapRecoStatut(s){s=norm(s);return (s.includes("fait")||s.includes("realis"))?"fait":s.includes("cours")?"en_cours":"a_faire";}
function mapPhase(s){s=norm(s);if(s.includes("reveal"))return"REVEAL";if(s.includes("connect"))return"CONNECT";if(s.includes("respond"))return"RESPOND";if(s.includes("strength"))return"STRENGTHEN";if(s.includes("review"))return"REVIEW";return"REVEAL";}
function applyImport(type,rows){
  if(type==="clients"){
    const hr=findHeaderRow(rows,["entreprise","ref bsm","societe"]);const h=rows[hr];
    const ci={ent:colIndex(h,["entreprise","societe"]),sect:colIndex(h,["secteur"]),contact:colIndex(h,["interlocuteur","contact"]),email:colIndex(h,["email"]),tel:colIndex(h,["telephone","tel"]),statut:colIndex(h,["statut"])};
    let n=0,u=0;
    for(let i=hr+1;i<rows.length;i++){const r=rows[i];const ent=gv(r,ci.ent);if(!ent)continue;
      let c=DB.clients.find(x=>norm(x.company)===norm(ent));
      const data={company:ent,sector:gv(r,ci.sect),contactName:gv(r,ci.contact),contactEmail:gv(r,ci.email),contactPhone:gv(r,ci.tel),status:mapStatut(gv(r,ci.statut))};
      if(c){Object.assign(c,data);u++;}else{DB.clients.push({id:uid(),createdAt:todayISO(),notes:"",...data});n++;}}
    return `${n} client(s) ajouté(s), ${u} mis à jour.`;
  }
  if(type==="risks"){
    const hr=findHeaderRow(rows,["famille","description du risque","probabilite"]);const h=rows[hr];
    const ci={ref:colIndex(h,["id","ref"]),ent:colIndex(h,["entreprise"]),fam:colIndex(h,["famille"]),cat:colIndex(h,["categorie"]),desc:colIndex(h,["description"]),prob:colIndex(h,["probabilite"]),imp:colIndex(h,["impact"]),mes:colIndex(h,["mesures"]),reco:colIndex(h,["recommandation"]),resp:colIndex(h,["responsable"]),delai:colIndex(h,["delai"]),statut:colIndex(h,["statut"])};
    let n=0;
    for(let i=hr+1;i<rows.length;i++){const r=rows[i];const desc=gv(r,ci.desc);const ent=gv(r,ci.ent);if(!desc&&!ent)continue;
      const cl=DB.clients.find(x=>norm(x.company)===norm(ent));
      DB.risks.push({id:uid(),ref:gv(r,ci.ref)||nextRef('R',DB.risks),clientId:cl?cl.id:"",famille:gv(r,ci.fam),categorie:gv(r,ci.cat),description:desc,probabilite:clampN(gv(r,ci.prob)),impact:clampN(gv(r,ci.imp)),mesures:gv(r,ci.mes),recoBSM:gv(r,ci.reco),responsable:gv(r,ci.resp),delai:gv(r,ci.delai),status:mapRiskStatut(gv(r,ci.statut)),missionId:"",dateSaisie:todayISO(),obs:""});n++;}
    return `${n} risque(s) importé(s).`;
  }
  if(type==="missions"){
    const hr=findHeaderRow(rows,["ref mission","type mission","phase"]);const h=rows[hr];
    const ci={ref:colIndex(h,["ref mission","ref"]),ent:colIndex(h,["entreprise"]),type:colIndex(h,["type mission","type"]),phase:colIndex(h,["phase"]),montant:colIndex(h,["montant"]),acompte:colIndex(h,["acompte"]),statut:colIndex(h,["statut"])};
    let n=0;
    for(let i=hr+1;i<rows.length;i++){const r=rows[i];const ent=gv(r,ci.ent);if(!ent)continue;
      const cl=DB.clients.find(x=>norm(x.company)===norm(ent));
      DB.missions.push({id:uid(),ref:gv(r,ci.ref)||nextRef('MIS',DB.missions),clientId:cl?cl.id:"",type:gv(r,ci.type),phase:mapPhase(gv(r,ci.phase)),montantHT:parseFloat(gv(r,ci.montant).replace(/[^\d.]/g,""))||0,currency:"MGA",acompte:parseFloat(gv(r,ci.acompte).replace(/[^\d.]/g,""))||0,nda:false,contrat:false,rapport:false,status:mapMissionStatut(gv(r,ci.statut)),notes:""});n++;}
    return `${n} mission(s) importée(s).`;
  }
  if(type==="recos"){
    const hr=findHeaderRow(rows,["recommandation","horizon","priorite"]);const h=rows[hr];
    const ci={ref:colIndex(h,["ref reco","#","ref"]),ent:colIndex(h,["entreprise"]),texte:colIndex(h,["recommandation"]),horizon:colIndex(h,["horizon"]),prio:colIndex(h,["priorite"]),resp:colIndex(h,["responsable"]),statut:colIndex(h,["statut"])};
    let n=0;
    for(let i=hr+1;i<rows.length;i++){const r=rows[i];const tx=gv(r,ci.texte);if(!tx)continue;
      const cl=DB.clients.find(x=>norm(x.company)===norm(gv(r,ci.ent)));
      DB.recommendations.push({id:uid(),ref:gv(r,ci.ref)||nextRef('REC',DB.recommendations),clientId:cl?cl.id:"",texte:tx,horizon:gv(r,ci.horizon),priorite:gv(r,ci.prio),responsable:gv(r,ci.resp),status:mapRecoStatut(gv(r,ci.statut)),avancement:0,dateCible:"",dateReal:"",moyens:"",indicateur:"",commentaire:"",riskId:""});n++;}
    return `${n} recommandation(s) importée(s).`;
  }
  return "Type inconnu.";
}
function doImportFile(){
  const fEl=document.getElementById("imp-file");const f=fEl.files[0];if(!f)return;
  const type=val("imp-type");const rd=new FileReader();
  rd.onload=()=>{try{const rows=parseCSV(rd.result);const msg=applyImport(type,rows);save();document.getElementById("imp-result").innerHTML="✅ "+msg;refreshAll();toast("Import terminé.");}catch(e){document.getElementById("imp-result").innerHTML="❌ Erreur de lecture du CSV.";}};
  rd.readAsText(f);
}
function doImportLive(){
  const url=val("imp-sheeturl").trim();const sheet=val("imp-sheetname").trim();const type=val("imp-type");
  const m=url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if(!m){document.getElementById("imp-result").innerHTML="❌ URL de Google Sheet invalide.";return;}
  const csvUrl=`https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv`+(sheet?`&sheet=${encodeURIComponent(sheet)}`:"");
  document.getElementById("imp-result").innerHTML="⏳ Lecture en cours…";
  fetch(csvUrl).then(r=>{if(!r.ok)throw 0;return r.text();}).then(txt=>{
    const rows=parseCSV(txt);const msg=applyImport(type,rows);save();document.getElementById("imp-result").innerHTML="✅ "+msg;refreshAll();toast("Import terminé.");
  }).catch(()=>{document.getElementById("imp-result").innerHTML="❌ Lecture impossible (Sheet non publié, hors-ligne, ou bloqué par Google). Utilise l'import de fichier CSV.";});
}
